<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#020617">
    <title>AGNI AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay" hidden></div>
<div class="app-shell">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div>
                <p class="eyebrow">Premium workspace</p>
                <h2>AGNI AI</h2>
            </div>
            <button id="new-chat-btn">+ New chat</button>
        </div>

        <div class="control-card">
            <div class="control-row">
                <label for="provider-select">AI provider</label>
                <select id="provider-select">
                    <option value="gemini">Google Gemini</option>
                    <option value="groq">Groq</option>
                    <option value="openai">OpenAI</option>
                </select>
            </div>
            <div class="control-row">
                <label for="model-select">Model</label>
                <select id="model-select"></select>
            </div>
            <div class="switch-row">
                <span>Think deeper</span>
                <button id="thinking-toggle" class="switch" type="button" role="switch" aria-checked="false" aria-label="Toggle deep thinking">
                    <span class="switch-knob"></span>
                </button>
            </div>
        </div>

        <div class="history-list" id="history-list">
            <div class="history-item active">Welcome chat</div>
        </div>
    </aside>

    <main class="chat-panel">
        <div class="chat-header">
            <div class="header-left">
                <button id="toggle-sidebar-btn" class="toggle-btn">☰</button>
                <div>
                    <h3>AGNI AI</h3>
                    <p>Smart assistant ready to help</p>
                </div>
            </div>
            <div class="header-meta">
                <div class="theme-toggle-container">
                    <span class="theme-label">Dark</span>
                    <button id="theme-toggle-btn" class="theme-switch" type="button" role="switch" aria-checked="false" aria-label="Toggle dark/light mode">
                        <span class="theme-switch-knob"></span>
                    </button>
                    <span class="theme-label">Light</span>
                </div>
                <button id="export-btn" class="text-btn" title="Export chat">Export</button>
                <button id="import-btn" class="text-btn" title="Import chat">Import</button>
                <input type="file" id="import-input" accept=".json" hidden>
                <div class="status-pill" id="status-pill">● Gemini · Flash</div>
            </div>
        </div>

        <div class="chat-box" id="chat-box">
            <div class="message bot-message">Hello! I’m your AI assistant. Ask me anything and I’ll help.</div>
        </div>

        <div class="suggestion-prompt-bar" id="suggestion-prompt-bar" aria-label="Suggested prompts"></div>

        <div class="chat-input-container">
            <div class="composer-stack">
                <div class="attachment-preview" id="attachment-preview"></div>
                <div class="composer-row">
                    <input type="text" id="user-input" placeholder="Ask anything, add files, or share images..." autocomplete="off">
                    <div class="composer-actions">
                        <button id="voice-input-btn" class="icon-btn voice-btn" type="button" title="Speak your prompt">
                            <span>🎤</span>
                        </button>
                        <label class="icon-btn" title="Add image">
                            <input type="file" id="image-input" accept="image/*" hidden>
                            <span>🖼️</span>
                        </label>
                        <label class="icon-btn" title="Add file">
                            <input type="file" id="file-input" hidden>
                            <span>📎</span>
                        </label>
                        <button id="send-btn">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="script.js?v=7"></script>
</body>
</html>
