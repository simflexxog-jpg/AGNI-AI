services:
  - type: web
    name: agni-ai
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: .
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: agni-ai-db
          property: connectionString
